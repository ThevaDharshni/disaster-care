<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login · DCMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark);">
<div style="width:100%;max-width:440px;padding:24px;">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="width:60px;height:60px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:#fff;margin:0 auto 16px;">DC</div>
    <h2 style="font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;">User Login</h2>
    <p style="color:var(--text-muted);font-size:13.5px;margin-top:6px;">Enter your name and password. New users are registered automatically.</p>
  </div>
  <div style="background:var(--dark2);border:1px solid var(--border);border-radius:18px;padding:36px;">
    <div th:if="${param.error}" class="alert alert-error" style="margin-bottom:16px;">Invalid credentials. Please try again.</div>
    <form action="/user/login-process" method="post">
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Full Name</label>
        <input class="form-control" type="text" name="name" placeholder="Enter your name" required/>
      </div>
      <div class="form-group" style="margin-bottom:24px;">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;font-size:15px;">Login →</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted);">
    <a href="/" style="color:var(--secondary);">← Back to Home</a>
  </div>
</div>
</body>
</html>
