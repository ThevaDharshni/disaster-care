<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donations · DCMS Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">DC</div>
      <div class="sidebar-title">Disaster<br/>Care Admin</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard" class="sidebar-item">📊 Dashboard</a>
      <div class="sidebar-label">Manage</div>
      <a href="/admin/shelters"  class="sidebar-item">🏕️ Shelters</a>
      <a href="/admin/donations" class="sidebar-item active">🎁 Donations</a>
      <a href="/admin/missing"   class="sidebar-item">🔍 Missing Persons</a>
      <div class="sidebar-label">Insights</div>
      <a href="/admin/reports"   class="sidebar-item">📈 Reports</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/admin/logout" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">Logout</a>
    </div>
  </aside>

  <div class="admin-content">
    <div class="admin-topbar">
      <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;">🎁 Donation Management</div>
    </div>
    <div class="admin-body">
      <div class="table-wrap">
        <div class="table-title">All Donations
          <span style="font-size:13px;color:var(--text-muted);" th:text="${donations.size()} + ' total'"></span>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Donor Name</th><th>Item Type</th><th>Quantity</th>
              <th>Address</th><th>Contact</th><th>Date</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="d : ${donations}">
              <td><code style="color:var(--text-muted);" th:text="'D-' + ${d.id}">D-1</code></td>
              <td><strong th:text="${d.donorName}">Name</strong></td>
              <td th:text="${d.itemType}">FOOD</td>
              <td th:text="${d.quantity}">50 kg</td>
              <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;" th:text="${d.address}">Address</td>
              <td th:text="${d.contactNumber}">9999999999</td>
              <td style="font-size:12px;color:var(--text-muted);" th:text="${#temporals.format(d.donatedAt,'dd MMM yyyy')}">01 Jan 2026</td>
              <td>
                <span th:if="${d.status.name() == 'PENDING'}"  class="pill pill-pending">Pending</span>
                <span th:if="${d.status.name() == 'ACCEPTED'}" class="pill pill-accepted">Accepted</span>
                <span th:if="${d.status.name() == 'REJECTED'}" class="pill pill-rejected">Rejected</span>
              </td>
              <td>
                <div style="display:flex;gap:6px;" th:if="${d.status.name() == 'PENDING'}">
                  <form th:action="@{/admin/donations/{id}/status(id=${d.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="status" value="ACCEPTED"/>
                    <button type="submit" class="btn btn-success btn-sm">Accept</button>
                  </form>
                  <form th:action="@{/admin/donations/{id}/status(id=${d.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="status" value="REJECTED"/>
                    <button type="submit" class="btn btn-danger btn-sm">Reject</button>
                  </form>
                </div>
                <span th:if="${d.status.name() != 'PENDING'}" style="font-size:12px;color:var(--text-muted);">Done</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
