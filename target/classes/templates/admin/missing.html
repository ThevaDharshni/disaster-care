<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Missing Persons · DCMS Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">DC</div>
      <div class="sidebar-title">Disaster<br/>Care Admin</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard" class="sidebar-item">📊 Dashboard</a>
      <div class="sidebar-label">Manage</div>
      <a href="/admin/shelters"  class="sidebar-item">🏕️ Shelters</a>
      <a href="/admin/donations" class="sidebar-item">🎁 Donations</a>
      <a href="/admin/missing"   class="sidebar-item active">🔍 Missing Persons</a>
      <div class="sidebar-label">Insights</div>
      <a href="/admin/reports"   class="sidebar-item">📈 Reports</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/admin/logout" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">Logout</a>
    </div>
  </aside>

  <div class="admin-content">
    <div class="admin-topbar">
      <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;">🔍 Missing Person Reports</div>
    </div>
    <div class="admin-body">
      <div class="table-wrap">
        <div class="table-title">All Reports
          <span style="font-size:13px;color:var(--text-muted);" th:text="${missingPersons.size()} + ' total'"></span>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Name</th><th>Age</th><th>Gender</th>
              <th>Blood Group</th><th>Last Seen</th><th>Reported</th><th>Status</th><th>AI Match</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="mp : ${missingPersons}">
              <td><code style="color:var(--text-muted);" th:text="'MP-' + ${mp.id}">MP-1</code></td>
              <td><strong th:text="${mp.name}">Name</strong></td>
              <td th:text="${mp.age}">25</td>
              <td th:text="${mp.gender}">MALE</td>
              <td th:text="${mp.bloodGroup != null} ? ${mp.bloodGroup} : '—'">O+</td>
              <td th:text="${mp.lastSeenLocation}">Location</td>
              <td style="font-size:12px;color:var(--text-muted);"
                  th:text="${#temporals.format(mp.reportedAt,'dd MMM yyyy')}">01 Jan 2026</td>
              <td>
                <span th:if="${mp.status.name() == 'MISSING'}"      class="pill pill-missing">Missing</span>
                <span th:if="${mp.status.name() == 'FOUND'}"        class="pill pill-found">Found</span>
                <span th:if="${mp.status.name() == 'INVESTIGATING'}" class="pill pill-pending">Investigating</span>
              </td>
              <td>
                <a th:href="@{/admin/missing/{id}/match(id=${mp.id})}"
                   class="btn btn-warning btn-sm">🤖 Find Match</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
