<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report Missing Person · DCMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><div class="nav-logo">DC</div><div class="nav-title">Disaster<span>Care</span></div></div>
  <div style="display:flex;gap:10px;">
    <a href="/user/map" class="btn btn-outline btn-sm">← Map</a>
    <a href="/user/logout" class="btn btn-primary btn-sm">Logout</a>
  </div>
</nav>

<div class="success-overlay" th:classappend="${success} ? 'show'" id="successOverlay">
  <div class="success-box">
    <div class="success-tick">✅</div>
    <h3>Report Submitted!</h3>
    <p>Missing person report has been saved. Our team will begin searching immediately.</p>
    <button class="btn btn-success" style="margin-top:20px;width:100%;"
            onclick="document.getElementById('successOverlay').classList.remove('show')">Close</button>
  </div>
</div>

<div class="page-wrapper">
  <div class="page-header">
    <h1>🔍 Report Missing Person</h1>
    <p>Fill all details carefully. The AI matching system uses this data to find the person in shelter records.</p>
  </div>
  <div class="page-body">
    <div style="max-width:640px;">
      <div class="table-wrap" style="padding:32px;">
        <form action="/user/missing-person" method="post" enctype="multipart/form-data">
          <div class="form-grid">
            <div class="form-group span-2">
              <label class="form-label">Full Name *</label>
              <input class="form-control" type="text" name="name" placeholder="Missing person's full name" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Age *</label>
              <input class="form-control" type="number" name="age" min="1" max="120" placeholder="Age" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Gender *</label>
              <select class="form-control" name="gender" required>
                <option value="">Select</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Blood Group</label>
              <select class="form-control" name="bloodGroup">
                <option value="">Unknown</option>
                <option>A+</option><option>A-</option>
                <option>B+</option><option>B-</option>
                <option>AB+</option><option>AB-</option>
                <option>O+</option><option>O-</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Identification Mark</label>
              <input class="form-control" type="text" name="identificationMark"
                     placeholder="e.g. scar on left cheek, tattoo on arm"/>
            </div>
            <div class="form-group span-2">
              <label class="form-label">Last Seen Location *</label>
              <input class="form-control" type="text" name="lastSeenLocation"
                     placeholder="e.g. Karaikal beach, Anna Nagar bus stop" required/>
            </div>
<!--            <div class="form-group span-2">&ndash;&gt;-->
<!--             <label class="form-label">Upload Photo (optional)</label>&ndash;&gt;-->
<!--              <input class="form-control" type="file" name="photo" accept="image/*"&ndash;&gt;-->
<!--                     style="padding:8px 14px;cursor:pointer;"/>&ndash;&gt;-->
<!--              <span style="font-size:11.5px;color:var(&#45;&#45;text-muted);margin-top:4px;">JPG, PNG up to 10MB</span>&ndash;&gt;-->
<!--            </div>-->
<!--          </div>-->
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:24px;">
            🔍 Submit Missing Person Report
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
